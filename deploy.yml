name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject GAS URL
        run: |
          if [ -n "${{ secrets.GAS_URL }}" ]; then
            sed -i "s|window.__GAS_URL__ || ''|'${{ secrets.GAS_URL }}'|g" public/index.html
            echo "GAS_URL injetado com sucesso"
          else
            echo "AVISO: secret GAS_URL não encontrado"
          fi

      - name: Verify injection
        run: |
          grep -o "GAS_URL.*=.*'" public/index.html | head -1 || echo "Linha GAS_URL:"
          grep "GAS_URL" public/index.html | head -3

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deploy
        uses: actions/deploy-pages@v4
