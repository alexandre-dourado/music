<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sem conexão — Fantasma</title>
<style>
  body{font-family:'Georgia',serif;background:#100e0b;color:#c4a882;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;gap:14px;padding:32px}
  .icon{font-size:56px;opacity:.5}
  h1{font-size:24px;font-weight:400;letter-spacing:-.01em;font-style:italic}
  p{color:#5a4530;font-size:14px;line-height:1.7;max-width:300px}
  button{margin-top:12px;background:none;border:1px solid #3d3228;color:#c4a882;padding:10px 24px;border-radius:100px;cursor:pointer;font-size:13px;font-family:inherit;transition:border-color .2s}
  button:hover{border-color:#c4a882}
</style>
</head>
<body>
  <div class="icon">📻</div>
  <h1>Sem conexão</h1>
  <p>Você está offline. Conecte-se para ouvir as músicas.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
